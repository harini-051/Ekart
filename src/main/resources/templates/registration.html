<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>ClickOps Technologies Registration</title>
    <div th:replace="fragments/header :: header"></div>
</head>

<body>

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container">
        <!-- Success Message -->
        <div class="alert alert-info" th:if="${successMessage}" th:utext="${successMessage}"></div>

        <div class="row" style="margin-top:20px">
            <div class="col-xs-12 col-sm-8 col-md-6 col-sm-offset-2 col-md-offset-3">
                <!-- Branding Title -->
                <h2 style="text-align: center; margin-bottom: 20px;">Welcome to ClickOps Technologies..</h2>

                <!-- Form -->
                <form autocomplete="off" th:action="@{/registration}" th:object="${user}" method="post">
                    <!-- Name -->
                    <div class="form-group">
                        <label th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="alert alert-danger"></label>
                        <input type="text" th:field="*{name}" placeholder="Name" class="form-control input-lg" />
                    </div>

                    <!-- Last Name -->
                    <div class="form-group">
                        <label th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="alert alert-danger"></label>
                        <input type="text" th:field="*{lastName}" placeholder="Last Name" class="form-control input-lg" />
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="alert alert-danger"></label>
                        <input type="email" th:field="*{email}" placeholder="Email" class="form-control input-lg" />
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="alert alert-danger"></label>
                        <input type="password" th:field="*{password}" placeholder="Password" class="form-control input-lg" />
                    </div>

                    <!-- Username -->
                    <div class="form-group">
                        <label th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="alert alert-danger"></label>
                        <input type="text" th:field="*{username}" placeholder="Username" class="form-control input-lg" />
                    </div>

                    <!-- Submit Button -->
                    <div class="row">
                        <div class="col-sm-3" style="float: none; margin: 0 auto;">
                            <input type="submit" class="btn btn-primary btn-block" value="Submit" />
                        </div>
                    </div>
                </form>

                <!-- Footer Branding -->
                <p style="text-align: center; margin-top: 20px;">Powered by ClickOps Technologies</p>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

</body>
</html>
